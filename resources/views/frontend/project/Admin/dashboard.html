<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Apply Poppins font to the entire document */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        /* Card styling */
        .card {
            background: #1e293b;
        }

        /* Progress bar styling */
        .progress-bar {
            height: 8px;
        }

        /* Table styling */
        .table {
            color: white;
            margin-top: 10px;
            background-color: #1e293b;
            border-color: #334155;
            font-size: 14px;
        }

        .table th,
        .table td {
            border-color: #334155;
            background-color: #1e293b;
            padding: 12px;
        }

        .table thead th {
            border-bottom: 2px solid #475569;
            font-weight: 600;
            color: #f8fafc;
        }

        .table tbody tr:hover {
            background-color: #334155;
            transition: background-color 0.3s ease;
        }

        .table tbody td {
            color: #e2e8f0;
            font-weight: 300; /* Light weight for table data */
        }

        /* Button styling */
        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background-color: #c82333;
            border-color: #bd2130;
        }

        .btn-danger i {
            margin-right: 5px;
        }

        /* Table heading styling */
        .table-heading {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #f8fafc;
        }

        /* Additional styling for better readability */
        h3 {
            font-weight: 600; /* Bold heading */
            color: #f8fafc; /* Light text color */
        }

        h5 {
            font-weight: 500; /* Medium weight for card headings */
        }

        p {
            font-weight: 300; /* Light weight for card content */
        }

        .table th {
            font-weight: 500; /* Medium weight for table headers */
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <div class="p-4">
        <h3 class="fs-3 fw-bold">Admin pannel</h3>
        <div class="row">
            <div class="col-md-3">
                <div class="card p-3">
                    <h5 class="text-white fs-6 fw-bold">Orders</h5>
                    <p class="text-white fs-6 fw-light">Ksh:10,000</p>
                    <div class="progress">
                        <div class="progress-bar bg-success" style="width: 30%"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <h5 class="text-white fs-6 fw-bold">Daily Sales</h5>
                    <p class="text-white fs-6 fw-light">Ksh:5,000</p>
                    <div class="progress">
                        <div class="progress-bar bg-danger" style="width: 15%"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <h5 class="text-white fs-6 fw-bold">monthly</h5>
                    <p class="text-white fs-6 fw-light">Ksh:70,000</p>
                    <div class="progress">
                        <div class="progress-bar bg-info" style="width: 50%"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <h5 class="text-white fs-6 fw-bold">Balance</h5>
                    <p class="text-white fs-6 fw-light">Ksh:100,000</p>
                    <div class="progress">
                        <div class="progress-bar bg-primary" style="width: 80%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Heading for the Table -->
        <h4 class="table-heading fs-4 fw-bold">Received Payments</h4>

        <!-- Table with Six Columns and Delete Button -->
        <div class="row mt-2">
            <div class="col">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th class="fs-6 fw-bold">ID</th>
                            <th class="fs-6 fw-bold">Name</th>
                            <th class="fs-6 fw-bold">Position</th>
                            <th class="fs-6 fw-bold">Department</th>
                            <th class="fs-6 fw-bold">Salary</th>
                            <th class="fs-6 fw-bold">Status</th>
                            <th class="fs-6 fw-bold">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fs-6 fw-light">1</td>
                            <td class="fs-6 fw-light">John Doe</td>
                            <td class="fs-6 fw-light">Software Engineer</td>
                            <td class="fs-6 fw-light">Engineering</td>
                            <td class="fs-6 fw-light">Ksh:80,000</td>
                            <td><span class="badge bg-success">Active</span></td>
                            <td><a class='btn btn-sm btn-danger' href='#'><i class="fas fa-trash-alt"></i> Delete</a></td>
                        </tr>
                        <!-- Add more rows as needed -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
