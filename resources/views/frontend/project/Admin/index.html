        .sidebar {

        .table tbody td {

        .btn-danger {

            margin-bottom: 10px; 
            color: #f8fafc; 
        }
        .logo {
            width: 100px; /* Smaller width for the logo */
            height: 100px; /* Same as width to make it square */
            background-color: #334155;
            margin: 20px auto; /* Center the logo horizontally */
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Ensures the image doesn't overflow the container */
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the image covers the container without distortion */
        }
        .sidebar-content {
            overflow-y: auto; 
            height: calc(100vh - 56px - 50px - 140px); 
            margin-top: 20px; 
        }
        .sidebar-content::-webkit-scrollbar {
            width: 6px; 
        }
        .sidebar-content::-webkit-scrollbar-track {
            background: #1e293b; 
            border-radius: 3px; 
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 3px; 
        }
        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
        .main-content {
            margin-left: 200px; 
            margin-top: 56px; 
            margin-bottom: 50px; 
            width: calc(100% - 200px); 
            height: calc(100vh - 56px - 50px); 
            overflow-y: auto; 
        }
        .main-content::-webkit-scrollbar {
            width: 6px; 
        }
        .main-content::-webkit-scrollbar-track {
            background: #0f172a; 
            border-radius: 3px; 
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 3px; 
        }
        .main-content::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
        .sidebar-section-header {
            color: #94a3b8; 
            font-size: 0.9rem; 
            font-weight: 600; 
            margin-top: 20px; 
            margin-bottom: 10px; 
            padding-left: 10px; 
            text-transform: uppercase; 
        }
        .sidebar .nav-link:hover {
            background-color: #334155; /* Change this to your desired hover color */
            color: #ffffff; /* Change this to your desired text color on hover */

            transition: background-color 0.3s ease, color 0.3s ease; /* Smooth transition */
