<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .verify-code-container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .verify-code-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #f8fafc;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group-text {
            background: #334155;
            border: none;
            color: #94a3b8;
        }
        .form-control {
            background: #334155;
            border: none;
            color: white;
        }
        .form-control:focus {
            background: #475569;
            color: white;
            box-shadow: none;
        }
        .btn-primary {
            background: #3b82f6;
            border: none;
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .alert {
            margin-top: 1rem;
        }
        .back-to-login {
            text-align: center;
            margin-top: 1rem;
        }
        .back-to-login a {
            color: #3b82f6;
            text-decoration: none;
        }
        .back-to-login a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="verify-code-container">
        <h2>Verify Code</h2>
        <form id="verifyCodeForm">
            <!-- Verification Code Field with Icon -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="fas fa-key"></i> <!-- Key Icon -->
                </span>
                <input type="text" class="form-control" id="verificationCode" placeholder="Enter verification code" autocomplete="off" required>
            </div>

            <button type="submit" class="btn btn-primary">Verify Code</button>
            <div class="back-to-login">
                <a href="login.html">Back to Login</a>
            </div>
        </form>
        <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success mt-3" style="display: none;"></div>
    </div>

    <script>
        document.getElementById("verifyCodeForm").addEventListener("submit", function (event) {
            event.preventDefault(); // Prevent form submission
    
            // Get input value
            const verificationCode = document.getElementById("verificationCode").value;
    
            // Validate verification code
            if (!verificationCode) {
                showErrorMessage("Verification code is required.");
                return;
            }
    
            // Send verification code to server
            fetch("verify_code.php", {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    verificationCode: verificationCode
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showSuccessMessage("Code verified! Redirecting to reset password page...");
                    
                    // Redirect to reset password page after 3 seconds
                    setTimeout(() => {
                        window.location.href = "reset-pass.html";
                    }, 3000);
                } else {
                    showErrorMessage(data.error || "Invalid verification code.");
                }
            })
            .catch(error => {
                console.error("Error:", error);
                showErrorMessage("An error occurred. Please try again.");
            });
        });
    
        // Function to show error messages
        function showErrorMessage(message) {
            const errorMessage = document.getElementById("errorMessage");
            errorMessage.textContent = message;
            errorMessage.style.display = "block";
    
            // Hide success message if visible
            const successMessage = document.getElementById("successMessage");
            successMessage.style.display = "none";
        }
    
        // Function to show success messages
        function showSuccessMessage(message) {
            const successMessage = document.getElementById("successMessage");
            successMessage.textContent = message;
            successMessage.style.display = "block";
    
            // Hide error message if visible
            const errorMessage = document.getElementById("errorMessage");
            errorMessage.style.display = "none";
        }
    </script>
</body>
</html>
